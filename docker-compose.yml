version: "3.9"

name: ${PROJECT_NAME}

services:
  api:
    build: ./services/api
    container_name: kap_api
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - kap_net

  web:
    build: ./services/web
    container_name: kap_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - kap_net

  simulator:
    build: ./services/simulator
    container_name: kap_simulator
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - kap_net

  nginx:
    image: nginx:stable
    container_name: kap_nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api
    networks:
      - kap_net

networks:
  kap_net:
    driver: bridge
